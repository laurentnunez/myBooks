<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ma Collection BD</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#3e4a89" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- En-tête -->
  <header class="app-header">
    <h1>📚 Ma Collection BD</h1>

    <div class="header-actions">
      <button id="themeToggle" class="btn secondary" title="Basculer clair/sombre">🌙</button>
      <div class="view-toggle">
      <!-- Toggle Liste / Grille (style iOS S1) -->
      <span>Grille</span>
      <label class="switch">
        <input type="checkbox" id="viewModeToggle">
        <span class="slider"></span>
      </label>
      <span>Liste</span>
    </div>
    </div>
  </header>

  <!-- Zone Filtres + Toggle Grille/Liste -->
  <section id="filtersArea" class="filters-area">

    <!-- Filtres statut -->
    <div id="filterBar" class="filter-bar">
      <button class="filter-btn active" data-filter="all">Tout</button>
      <button class="filter-btn" data-filter="collec">La Collec'</button>
      <button class="filter-btn" data-filter="a_lire">À lire</button>
      <button class="filter-btn" data-filter="lu">Lu</button>
      <button class="filter-btn" data-filter="a_vendre">À vendre</button>
      <button class="filter-btn" data-filter="wishlist">Wishlist</button>

      <button id="addButton" class="btn primary add-floating">+</button>
    </div>

    

  </section>

  <!-- Liste des BD -->
  <section id="bdList" class="bd-list grid-mode" aria-live="polite" aria-label="Liste des BD"></section>

  <!-- Modale d’ajout / modification -->
  <div id="modal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">

      <h2 id="modalTitle">Ajouter / Modifier une BD</h2>

      <!-- Import ISBN déplacé ici -->
      <div class="isbn-zone">
        <label for="isbnInputModal">Importer via ISBN :</label>
        <div class="isbn-row">
          <input
            id="isbnInputModal"
            inputmode="numeric"
            pattern="[0-9Xx\- ]*"
            placeholder="ISBN (10 ou 13 chiffres)"
            aria-label="Saisir un ISBN"
          />
          <button id="importIsbnBtnModal" class="btn">Importer</button>
        </div>
        <small id="importHintModal" class="hint">Google Books → Open Library</small>
      </div>

      <div class="form-grid">
        <input id="titleInput" placeholder="Titre" aria-label="Titre" />
        <input id="authorInput" placeholder="Auteur(s)" aria-label="Auteur(s)" />
        <input id="artistInput" placeholder="Dessinateur(s)" aria-label="Dessinateur(s)" />
        <input id="editorInput" placeholder="Éditeur" aria-label="Éditeur" />
        <input type="date" id="dateInput" aria-label="Date de parution" />

        <label for="statusInput">Statut :</label>
        <select id="statusInput" aria-label="Statut">
          <option value="a_lire">À lire</option>
          <option value="lu">Lu</option>
          <option value="wishlist">Wishlist</option>
          <option value="a_vendre">À vendre</option>
        </select>

        <label for="coverInput">Couverture :</label>
        <input type="file" accept="image/*" id="coverInput" aria-label="Importer une image de couverture" />
      </div>

      <div class="modal-actions">
        <button id="saveButton" class="btn primary">Enregistrer</button>
        <button id="cancelButton" class="btn">Annuler</button>
      </div>

    </div>
  </div>

  <noscript>Active JavaScript pour utiliser l’application.</noscript>

  <!-- App -->
  <script src="app.js" defer></script>

</body>
</html>
