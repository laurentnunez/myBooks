<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MyBooks</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0e1014" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- En-tête -->
<div class="top-area">   
  <header class="app-header">
    <div class="thehead">
      <img class="mybookslogo" src="mybookslogo.png" alt="Logo MyBooks" />
      <h1>MyBooks</h1>
    </div>

    <div class="header-actions">
      <div class="view-toggle">
        <span>Grille</span>
        <label class="switch">
          <input type="checkbox" id="viewModeToggle" />
          <span class="slider"></span>
        </label>
        <span>Liste</span>
      </div>
    </div>
  </header>

  <!-- Filtres -->
  <section id="filtersArea" class="filters-area">
    <div id="filterBar" class="filter-bar">
      <button class="filter-btn" data-filter="collec">La Collec'</button>
      <button class="filter-btn" data-filter="a_lire">À lire</button>
      <button class="filter-btn" data-filter="lu">Lu</button>
      <!--<button class="filter-btn" data-filter="a_vendre">À vendre</button> -->
      <button class="filter-btn" data-filter="wishlist">Wishlist</button>
    </div>
    <button id="addButton" class="btn primary add-floating" aria-label="Ajouter une BD">+</button>
  </section>
</div>

  <!-- Liste des BD -->
  <section id="bdList" class="bd-list grid-mode"></section>

  <!-- Modale d’ajout / édition -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Ajouter / Modifier une BD</h2>

      <div class="form-grid">
        <input id="seriesInput" placeholder="Série" />
        <div class="titleTome">
          <input id="tomeInput" class="tomeInput" type="number" placeholder="Tome" min="1" />
          <input id="titleInput" placeholder="Titre" />
        </div>
        <input id="authorInput" placeholder="Auteur(s)" />
        <input id="artistInput" placeholder="Dessinateur(s)" />
        <input id="editorInput" placeholder="Éditeur" />
        <input type="date" id="dateInput" placeholder="Date"/>

        <label for="statusInput">Statut :</label>
        <select id="statusInput">
          <option value="a_lire">À lire</option>
          <option value="lu">Lu</option>
          <option value="wishlist">Wishlist</option>
          <option value="a_vendre">À vendre</option>
        </select>

        <label for="coverInput">Couverture :</label>
        <input type="file" accept="image/*" id="coverInput" />

        <textarea
          id="synopsisInput"
          class="synopsis"
          placeholder="Synopsis"></textarea>
      </div>

      <div class="modal-actions">
        <button id="saveButton" class="btn primary">Enregistrer</button>
        <button id="cancelButton" class="btn">Annuler</button>
      </div>
    </div>
  </div>

<!-- Modale Détails BD -->
<div id="detailModal" class="modal hidden">
  <div class="modal-content detail-modal">
    
    <img id="detailCover" class="detail-cover" alt="Couverture BD">
    
    <h3 id="detailSeries"></h3>
    <div class="theSeries">
      <p><strong>Tome :</strong><h3 id="detailTome">/h3>
      <h3 id="detailTitle"></h3>
    </div>

    <p><strong>Auteur :</strong> <span id="detailAuthor"></span></p>
    <p><strong>Dessinateur :</strong> <span id="detailArtist"></span></p>
    <p><strong>Éditeur :</strong> <span id="detailEditor"></span></p>
    <p><strong>Parution :</strong> <span id="detailDate"></span></p>

    <h3>Synopsis</h3>
    <p id="detailSynopsis"></p>

    <div class="modal-actions">
      <button id="detailEdit" class="btn">✏️ Modifier</button>
      <button id="detailDelete" class="btn">🗑️ Supprimer</button>
      <button id="detailClose" class="btn primary">Fermer</button>
    </div>
  </div>
</div>

    
  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
