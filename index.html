<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MyBooks</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0e1014" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Racine Toast -->
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <!-- JS -->
  <script src="app.js"></script>

  <!-- Barre d'actions fixe (mobile) -->
  <div id="bottomActions" class="bottom-actions" aria-label="Actions d'export/import">
    <!-- Statistiques -->
    <section id="statsArea" class="stats-area">
      <div class="stats-item"><strong>Total :</strong> <span id="statTotal">0</span></div>
      <div class="stats-item"><strong>Lus :</strong> <span id="statRead">0</span></div>
      <div class="stats-item"><strong>Pages lues :</strong> <span id="statPages">0</span></div>
    </section> 

    <button id="addButton" class="btn primary add-floating" aria-label="Ajouter une BD">+</button>


  </div>


  <!-- En-tête -->
  <div class="top-area">
    <header class="app-header">
      <div class="thehead">
        <img class="mybookslogo" src="mybookslogo.png" alt="Logo MyBooks" />
        <h1>MyBooks</h1>
      </div>

      <div class="group-toggle" title="Grouper les tomes par série (mode grille)">
        <span>Album</span>
        <label class="switch">
          <input type="checkbox" id="groupBySeriesToggle" />
          <span class="slider"></span>
        </label>
        <span>Série</span>
      </div>
    </header>

    <!-- Filtres -->
    <section id="filtersArea" class="filters-area">
      <div id="filterBar" class="filter-bar">
        <button class="filter-btn" data-filter="collec">La Collec'</button>
        <button class="filter-btn" data-filter="a_lire">À lire</button>
        <button class="filter-btn" data-filter="lu">Lu</button>
        <button class="filter-btn" data-filter="wishlist">Wishlist</button>
      </div>

    </section>
  </div>

  

  <!-- Liste des BD -->
  <section id="bdList" class="bd-list grid-mode"></section>

    <!-- Modale ajout / édition -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Ajouter / Modifier une BD</h2>

      <div class="form-grid">
        
        <div class="isbn-row">
          <input id="isbnInput" placeholder="ISBN (10 ou 13 chiffres)" />
          <button id="isbnFetchButton" class="btn primary">
            Récupérer via ISBN
          </button>
        </div>

        <input id="seriesInput" placeholder="Série" />
        
          <label class="checkbox-row">
            <input type="checkbox" id="oneShotCheckbox" />
            Récit complet
          </label>

        <div class="titleTome">
          <input id="tomeInput" class="tomeInput" type="number" placeholder="N°" min="1" />
          <input id="titleInput" placeholder="Titre" />
        </div>
        <input id="authorInput" placeholder="Auteur(s)" />
        <input id="artistInput" placeholder="Dessinateur(s)" />
        <div class="editor-pages-row">
          <input id="editorInput" placeholder="Éditeur" />
          <input id="pagesInput" type="number" placeholder="Pages" min="1" maxlength="4" />
        </div>

        <div class="date-status-row">
          <input type="date" id="dateInput" placeholder="Date" />
          <select id="statusInput">
            <option value="a_lire">À lire</option>
            <option value="lu">Lu</option>
            <option value="wishlist">Wishlist</option>
          </select>
        </div>
        
        <label for="coverInput">Couverture :</label>
        <input type="file" accept="image/*" id="coverInput" />


        <div class="tags-selector">
          <span class="tag-btn" data-tag="Aventure">Aventure</span>
          <span class="tag-btn" data-tag="Fantasy">Fantasy</span>
          <span class="tag-btn" data-tag="Policier">Policier</span>
          <span class="tag-btn" data-tag="Horreur">Horreur</span>
          <span class="tag-btn" data-tag="SF">SF</span>
          <span class="tag-btn" data-tag="Historique">Historique</span>
          <span class="tag-btn" data-tag="Western">Western</span>
          <span class="tag-btn" data-tag="Humour">Humour</span>
          <span class="tag-btn" data-tag="Fantastique">Fantastique</span>
        </div>



      </div>

      <div class="modal-actions">
        <button id="saveButton" class="btn">
          <svg viewBox="0 0 32 32" class="icon-close">
              <path d="M26,29H6a3,3,0,0,1-3-3V6A3,3,0,0,1,6,3H20.26a3,3,0,0,1,1.95.72L28,8.64A3,3,0,0,1,29,10.92V26A3,3,0,0,1,26,29ZM6,5A1,1,0,0,0,5,6V26a1,1,0,0,0,1,1H26a1,1,0,0,0,1-1V10.92a1,1,0,0,0-.35-.76L20.91,5.24A1,1,0,0,0,20.26,5Z" fill="currentColor"/>
              <path d="M18,10H10A2,2,0,0,1,8,8V4A1,1,0,0,1,9,3H19a1,1,0,0,1,1,1V8A2,2,0,0,1,18,10ZM10,5V8h8V5Z" fill="currentColor"/>
              <path d="M23,29H9a1,1,0,0,1-1-1V17a2,2,0,0,1,2-2H22a2,2,0,0,1,2,2V28A1,1,0,0,1,23,29ZM10,27H22V17H10Z" fill="currentColor"/>
            </svg>
        </button>
        <button id="cancelButton" class="btn">
          <svg viewBox="0 0 32 32" class="icon-close">
              <path d="M16,29A13,13,0,1,1,29,16,13,13,0,0,1,16,29ZM16,5A11,11,0,1,0,27,16,11,11,0,0,0,16,5Z" fill="currentColor"/>
              <path d="M11.76,21.24a1,1,0,0,1-.71-.29,1,1,0,0,1,0-1.41l8.49-8.49A1,1,0,0,1,21,12.46L12.46,21A1,1,0,0,1,11.76,21.24Z" fill="currentColor"/>
              <path d="M20.24,21.24a1,1,0,0,1-.7-.29l-8.49-8.49a1,1,0,0,1,1.41-1.41L21,19.54A1,1,0,0,1,21,21,1,1,0,0,1,20.24,21.24Z" fill="currentColor"/>
            </svg>
        </button>

      </div>
    </div>
  </div>

  <!-- Modale détails -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-content detail-modal">
  
    <div class="read-toggle">
        <span>À lire</span>
            <label class="switch">
              <input type="checkbox" id="detailToggleRead">
        <span class="slider"></span>
            </label>
        <span>Lu</span>
    </div>

      <div class="detail-layout">

        <!-- Cover -->
        <div class="detail-cover-wrap">
          <img id="detailCover" class="detail-cover" alt="Couverture BD">
          <div id="detailTags" class="detail-tags"></div>
        </div>
        
        
        
        <!-- Infos -->
        <div class="detail-info">         
          
          <div class="detail-topline">
            <!-- Série -->
            <h3 id="detailSeries" class="detail-series"></h3>
            
          </div>

          <div class="detail-meta">
        
            <div class="detail-title-line">
                <span class="chip chip-accent tome-chip"><span id="detailTome"></span>
                </span>
                <h2 id="detailTitle" class="detail-title"></h2>
            </div>

            <div class="meta-row"><span class="meta-label">Auteur(s)</span><span id="detailAuthor" class="meta-value"></span></div>
            <div class="meta-row"><span class="meta-label">Dessinateur(s)</span><span id="detailArtist" class="meta-value"></span></div>
            <div class="meta-row"><span class="meta-label">Éditeur</span><span id="detailEditor" class="meta-value"></span></div>
            <div class="meta-row"><span class="meta-label">Parution</span><span id="detailDate" class="meta-value"></span></div>
          </div>

          

        </div>
      </div>

      <div class="modal-actions">
        <button id="detailEdit" class="btn">
          <svg viewBox="0 0 24 24" class="icon-edit">
              <path d="M21.707,5.565,18.435,2.293a1,1,0,0,0-1.414,0L3.93,15.384a.991.991,0,0,0-.242.39l-1.636,4.91A1,1,0,0,0,3,22a.987.987,0,0,0,.316-.052l4.91-1.636a.991.991,0,0,0,.39-.242L21.707,6.979A1,1,0,0,0,21.707,5.565ZM7.369,18.489l-2.788.93.93-2.788,8.943-8.944,1.859,1.859ZM17.728,8.132l-1.86-1.86,1.86-1.858,1.858,1.858Z" fill="currentColor"/>
          </svg>
        </button>

          
      <button id="detailDelete" class="btn">
          <svg viewBox="0 0 448 512" class="icon-delete">
              <path d="M374.845,112V80c0-20.872-14.845-48-46.845-48H184c-32,0-45.855,16-45.855,48v32H56v48h32v272c0,32,18.145,48,50.145,48
              H376c32,0,48-16,48-48V160h32v-48H374.845z M184,80h144v32H184V80z M376,432H138.145V160H376V432z" fill="currentColor"/>
          </svg>
        </button>

        <button id="detailClose" class="btn">
          <svg viewBox="0 0 32 32" class="icon-close">
              <path d="M16,29A13,13,0,1,1,29,16,13,13,0,0,1,16,29ZM16,5A11,11,0,1,0,27,16,11,11,0,0,0,16,5Z" fill="currentColor"/>
              <path d="M11.76,21.24a1,1,0,0,1-.71-.29,1,1,0,0,1,0-1.41l8.49-8.49A1,1,0,0,1,21,12.46L12.46,21A1,1,0,0,1,11.76,21.24Z" fill="currentColor"/>
              <path d="M20.24,21.24a1,1,0,0,1-.7-.29l-8.49-8.49a1,1,0,0,1,1.41-1.41L21,19.54A1,1,0,0,1,21,21,1,1,0,0,1,20.24,21.24Z" fill="currentColor"/>
            </svg>
        </button>

      </div>
    </div>
  </div>

  
</body>
</html>
